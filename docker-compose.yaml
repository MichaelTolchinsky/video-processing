services:
  api:
    build: .
    command:
      - uvicorn
      - video_processing.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      DATABASE_URL: postgresql+psycopg://video_processing:video_processing@db:5432/video_processing
      PYTHONPATH: /app/src
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: eu-north-1
      S3_BUCKET_NAME: video-processing-local
      S3_ENDPOINT_URL: http://localstack:4566
      S3_PUBLIC_ENDPOINT_URL: http://localhost:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/video-processing-local
      SQS_ENDPOINT_URL: http://localstack:4566
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_TIMEOUT: "5"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "video_processing.worker.main"]
    environment:
      DATABASE_URL: postgresql+psycopg://video_processing:video_processing@db:5432/video_processing
      PYTHONPATH: /app/src
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: eu-north-1
      S3_BUCKET_NAME: video-processing-local
      S3_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/video-processing-local
      SQS_ENDPOINT_URL: http://localstack:4566
      DB_POOL_SIZE: "2"
      DB_MAX_OVERFLOW: "1"
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: video_processing
      POSTGRES_USER: video_processing
      POSTGRES_PASSWORD: video_processing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_processing -d video_processing"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3.8.1
    environment:
      AWS_DEFAULT_REGION: eu-north-1
      SERVICES: s3,sqs
      S3_BUCKET_NAME: video-processing-local
      SQS_QUEUE_NAME: video-processing-local
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "4566:4566"
    volumes:
      - ./localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
      # Runs after init-s3.sh (LocalStack executes ready.d scripts in
      # lexicographical order, and "init-s3.sh" sorts before "init-sqs.sh"),
      # so the bucket already exists when this wires the notification to it.
      - ./localstack/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh:ro

volumes:
  postgres_data:
