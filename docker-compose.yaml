services:
  api:
    build: .
    command:
      - uvicorn
      - video_processing.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      DATABASE_URL: postgresql+psycopg://video_processing:video_processing@db:5432/video_processing
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: video_processing
      POSTGRES_USER: video_processing
      POSTGRES_PASSWORD: video_processing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_processing -d video_processing"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
